<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM 取向测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #1a1a2e;
    color: #fff;
    user-select: none;
  }
  .container { display: flex; height: 100vh; position: relative; }
  .half {
    flex: 1; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: flex 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative; overflow: hidden;
  }
  .half::before {
    content: ''; position: absolute; inset: 0;
    opacity: 0.06;
    background-image: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .half-left { background: linear-gradient(135deg, #5c0e2e 0%, #a0291e 50%, #c0392b 100%); }
  .half-right { background: linear-gradient(135deg, #0f2450 0%, #1a3068 50%, #2c3e70 100%); }
  .half.chosen-left { flex: 1.15; }
  .half.chosen-right { flex: 1.15; }
  .option-content { text-align: center; z-index: 2; opacity: 0.85; transition: opacity 0.3s, transform 0.3s; }
  .half:hover .option-content { opacity: 1; transform: scale(1.05); }
  .option-icon { font-size: 52px; margin-bottom: 10px; display: block; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
  .option-label { font-size: 22px; font-weight: 600; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .option-sub { font-size: 13px; opacity: 0.5; margin-top: 6px; letter-spacing: 4px; }
  .badge { position: absolute; top: 50%; transform: translateY(-50%); font-size: 180px; font-weight: 900; opacity: 0.05; pointer-events: none; letter-spacing: -8px; }
  .badge-left { right: -20px; }
  .badge-right { left: -20px; }
  .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 30px 8px; background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0) 100%); pointer-events: none; }
  .progress-wrapper { position: relative; height: 10px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: visible; }
  .progress-track { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #8b1a3a, #c0392b, #e67e22, #f1c40f, #2ecc71, #3498db, #2c3e80, #1a1a5c); position: relative; overflow: hidden; }
  .progress-dim { position: absolute; top: 0; height: 100%; width: 50%; transition: opacity 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 0; pointer-events: none; }
  .progress-dim#dimLeft { left: 0; background: rgba(26,26,46,0.7); border-radius: 10px 0 0 10px; opacity: 0; }
  .progress-dim#dimRight { right: 0; background: rgba(26,26,46,0.7); border-radius: 0 10px 10px 0; opacity: 0; }
  .progress-center-marker { position: absolute; left: 50%; top: -4px; width: 2px; height: 18px; background: rgba(255,255,255,0.25); border-radius: 1px; transform: translateX(-50%); }
  .progress-indicator { position: absolute; top: -9px; width: 28px; height: 28px; border-radius: 50%; background: #fff; box-shadow: 0 0 24px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.3); transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #1a1a2e; }
  .tier-labels { position: relative; height: 24px; margin-top: 2px; }
  .tier-label { position: absolute; transform: translateX(-50%); font-size: 11px; opacity: 0.5; letter-spacing: 1px; white-space: nowrap; transition: opacity 0.3s; }
  .tier-label.active { opacity: 0.9; font-weight: 700; text-shadow: 0 0 12px rgba(255,255,255,0.15); }
  .tier-label.s-side { color: #e74c3c; }
  .tier-label.m-side { color: #5dade2; }
  .tier-label.center { color: #f1c40f; }
  .question-area { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; text-align: center; pointer-events: none; }
  .question-card { background: rgba(26,26,46,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 32px 48px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); pointer-events: auto; animation: cardIn 0.45s ease-out; min-width: 320px; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(24px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .question-number { font-size: 12px; opacity: 0.35; letter-spacing: 3px; margin-bottom: 6px; }
  .question-icon { font-size: 44px; margin-bottom: 8px; display: block; }
  .question-text { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .question-hint { font-size: 13px; opacity: 0.35; }
  .skip-btn { display: inline-block; margin-top: 16px; padding: 6px 20px; border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.35); font-size: 13px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; pointer-events: auto; }
  .skip-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }
  .result-overlay { position: fixed; inset: 0; z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(26,26,46,0.93); backdrop-filter: blur(14px); animation: fadeIn 0.8s ease-out; }
  .result-overlay.active { display: flex; }
  .result-radar-wrap { width: 240px; height: 240px; margin: 10px auto; position: relative; }
  #radarChart { width: 100%; height: 100%; }
  .dim-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 360px; margin: 0 auto 12px; }
  .dim-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 6px 12px; text-align: center; min-width: 88px; flex: 1; }
  .dim-item .dim-label { font-size: 10px; opacity: 0.5; margin-bottom: 2px; }
  .dim-item .dim-bar { height: 3px; border-radius: 3px; background: rgba(255,255,255,0.08); margin: 3px 0; overflow: hidden; }
  .dim-item .dim-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease; }
  .dim-item .dim-value { font-size: 13px; font-weight: 600; }
  .result-actions { display: flex; gap: 10px; margin-bottom: 14px; justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .result-radar-wrap { width: 260px; height: 260px; margin: 12px auto; position: relative; }
  #radarChart { width: 100%; height: 100%; }
  .dim-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 380px; margin: 0 auto 16px; }
  .dim-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 100px; flex: 1; }
  .dim-item .dim-label { font-size: 11px; opacity: 0.5; margin-bottom: 2px; }
  .dim-item .dim-bar { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.08); margin: 4px 0; overflow: hidden; }
  .dim-item .dim-fill { height: 100%; border-radius: 4px; transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1); }
  .dim-item .dim-value { font-size: 14px; font-weight: 600; }
  .share-btn { pointer-events: auto; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 10px 24px; border-radius: 50px; font-size: 14px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
  .share-btn:hover { background: rgba(255,255,255,0.1); }
  /* AI 分析 */
  .ai-section { margin-top: 16px; text-align: center; max-width: 420px; }
  .ai-input { width: 260px; padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #fff; font-size: 13px; text-align: center; margin-bottom: 8px; outline: none; }
  .ai-input:focus { border-color: rgba(255,255,255,0.25); }
  .ai-input::placeholder { color: rgba(255,255,255,0.25); }
  .ai-key-hint { font-size: 11px; opacity: 0.35; margin-bottom: 8px; }
  .ai-key-hint a { color: #5dade2; opacity: 0.8; }
  .ai-btn { pointer-events: auto; background: rgba(94,53,177,0.3); border: 1px solid rgba(149,117,205,0.3); color: #fff; padding: 10px 22px; border-radius: 50px; font-size: 14px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
  .ai-btn:hover { background: rgba(94,53,177,0.5); }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ai-loading { display: none; text-align: center; margin-top: 10px; }
  .ai-loading.active { display: block; }
  .ai-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #9b59b6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-result { display: none; text-align: left; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; margin-top: 14px; max-height: 240px; overflow-y: auto; font-size: 13px; line-height: 1.7; opacity: 0; transition: opacity 0.5s; }
  .ai-result.active { display: block; opacity: 1; }
  .ai-result p { margin-bottom: 8px; opacity: 0.8; }
  .result-icon { font-size: 72px; margin-bottom: 8px; }
  .result-title { font-size: 34px; font-weight: 800; margin-bottom: 6px; }
  .result-desc { font-size: 15px; opacity: 0.55; max-width: 420px; text-align: center; line-height: 1.7; margin-bottom: 24px; }
  .result-stats { display: flex; gap: 36px; margin-bottom: 24px; }
  .result-stat { text-align: center; }
  .result-stat-value { font-size: 30px; font-weight: 700; }
  .result-stat-label { font-size: 12px; opacity: 0.45; margin-top: 3px; }
  .btn-restart { pointer-events: auto; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 12px 36px; border-radius: 50px; font-size: 16px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
  .btn-restart:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }
  .btn-small-restart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 90; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.35); padding: 6px 18px; border-radius: 50px; font-size: 12px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; pointer-events: auto; }
  .btn-small-restart:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
  @media (max-width: 640px) {
  .question-card { padding: 18px 20px 14px; min-width: auto; margin: 0 10px; max-width: 85vw; }
  .question-text { font-size: 19px; }
  .question-icon { font-size: 32px; }
  .question-number { font-size: 10px; }
  .question-hint { font-size: 11px; }
  .skip-btn { margin-top: 10px; padding: 4px 14px; font-size: 11px; }
  .question-area { top: 55%; transform: translate(-50%, -60%); }
  .option-label { font-size: 15px; }
  .option-icon { font-size: 32px; }
  .option-sub { font-size: 10px; }
  .half { align-items: flex-end; padding-bottom: 30px; }
  .badge { font-size: 72px; }
  .top-bar { padding: 10px 10px 4px; }
  .tier-label { font-size: 8px; }
  .progress-indicator { width: 22px; height: 22px; font-size: 9px; top: -7px; }
  .result-title { font-size: 24px; }
  .result-desc { font-size: 13px; }
  .result-icon { font-size: 52px; }
  .result-stats { gap: 18px; }
  .result-stat-value { font-size: 22px; }
  .result-stat-label { font-size: 10px; }
  .btn-restart { padding: 10px 28px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="half half-left" id="leftHalf" onclick="choose('left')">
    <div class="badge badge-left">S</div>
    <div class="option-content">
      <span class="option-icon" id="leftIcon">👑</span>
      <div class="option-label" id="leftLabel">看别人带</div>
      <div class="option-sub">S 倾向</div>
    </div>
  </div>
  <div class="half half-right" id="rightHalf" onclick="choose('right')">
    <div class="badge badge-right">M</div>
    <div class="option-content">
      <span class="option-icon" id="rightIcon">🔗</span>
      <div class="option-label" id="rightLabel">给自己带</div>
      <div class="option-sub">M 倾向</div>
    </div>
  </div>
</div>
<div class="top-bar">
  <div class="progress-wrapper">
    <div class="progress-center-marker"></div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-dim" id="dimLeft"></div>
      <div class="progress-dim" id="dimRight"></div>
    </div>
    <div class="progress-indicator" id="progressDot" style="left:50%">·</div>
  </div>
  <div class="tier-labels" id="tierLabels"></div>
</div>
<div class="question-area" id="questionArea">
  <div class="question-card" id="questionCard">
    <div class="question-number" id="qNumber">1 / 23</div>
    <span class="question-icon" id="qIcon">😶</span>
    <div class="question-text" id="qText">口球？</div>
    <div class="question-hint">选择一个方向</div>
    <div><button class="skip-btn" id="skipBtn" onclick="skipQuestion()">✕ 不适合我 · 跳过</button></div>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-icon" id="resultIcon">⚖️</div>
  <div class="result-title" id="resultTitle">测试结果</div>
  <div class="result-desc" id="resultDesc">你的取向分析</div>
  <div class="result-radar-wrap"><canvas id="radarChart" width="240" height="240"></canvas></div>
  <div class="dim-grid" id="dimGrid"></div>
  <div class="result-stats">
    <div class="result-stat"><div class="result-stat-value" id="statS">0</div><div class="result-stat-label">S 回答</div></div>
    <div class="result-stat"><div class="result-stat-value" id="statM">0</div><div class="result-stat-label">M 回答</div></div>
    <div class="result-stat"><div class="result-stat-value" id="statSkip">0</div><div class="result-stat-label">跳过</div></div>
    <div class="result-stat"><div class="result-stat-value" id="statTotal">23</div><div class="result-stat-label">总题数</div></div>
  </div>
    <div class="ai-section" id="aiSection">
    <input class="ai-input" id="aiKey" type="password" placeholder="输入 OpenRouter API Key" onchange="saveApiKey()" />
    <div class="ai-key-hint">免费注册 <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> 获取 Key</div>
    <button class="ai-btn" id="aiBtn" onclick="runAiAnalysis()">🤖 AI 深度分析</button>
    <div class="ai-loading" id="aiLoading"><span class="ai-spinner"></span><br/><small style="opacity:0.4">AI 正在分析你的选择模式...</small></div>
    <div class="ai-result" id="aiResult"></div>
  </div>
  <div class="result-actions"><button class="share-btn" onclick="shareResult()">📤 分享结果</button><button class="btn-restart" onclick="restart()">重新测试</button></div>
</div>
<button class="btn-small-restart" onclick="restart()">↻ 重新测试</button>

<script>


const QUESTIONS = [
  { icon: '😶',  text: '口球？',        left: '看别人带',  right: '给自己带' },
  { icon: '🎭',  text: '眼罩？',        left: '给别人戴',  right: '给自己戴' },
  { icon: '⛓️',  text: '手铐？',        left: '铐别人',    right: '被铐' },
  { icon: '🪶',  text: '羽毛挠痒？',    left: '挠别人',    right: '被挠' },
  { icon: '📢',  text: '指令感？',      left: '发号施令',  right: '听从指令' },
  { icon: '🎪',  text: '角色扮演？',    left: '扮演主人',  right: '扮演仆从' },
  { icon: '🕯️',  text: '蜡烛？',        left: '滴别人',    right: '被滴' },
  { icon: '🪢',  text: '绳子绑缚？',    left: '绑别人',    right: '被绑' },
  { icon: '🦯',  text: '皮鞭？',        left: '挥鞭子',    right: '挨鞭子' },
  { icon: '✋',  text: '拍打？',        left: '拍别人',    right: '被拍' },
  { icon: '🎯',  text: '快感控制？',    left: '掌控他人',  right: '被掌控' },
  { icon: '🗣️',  text: '言语羞辱？',    left: '羞辱别人',  right: '被羞辱' },
  { icon: '🌫️',  text: '窒息控制？',    left: '控制呼吸',  right: '被控制呼吸' },
  { icon: '🧊',  text: '冰与热？',      left: '施加冷热',  right: '承受冷热' },
  { icon: '⚡',  text: '电击？',        left: '使用电击',  right: '承受电击' },
  { icon: '🪡',  text: '针刺？',        left: '扎别人',    right: '被扎' },
  { icon: '💧',  text: '灌肠？',        left: '操作灌肠',  right: '接受灌肠' },
  { icon: '🫧',  text: '尿液玩法？',    left: '浇别人',    right: '被浇' },
  { icon: '🪨',  text: '泥土掩埋？',    left: '埋别人',    right: '被埋' },
  { icon: '🔪',  text: '刀割？',        left: '划别人',    right: '被划' },
  { icon: '🔥',  text: '烙印？',        left: '烙印别人',  right: '被烙印' },
  { icon: '🩸',  text: '穿刺？',        left: '穿刺别人',  right: '被穿刺' },
  { icon: '🧠',  text: '催眠控制？',    left: '催眠别人',  right: '被催眠' },
];

const Q_DIMS = [
  'bind','bind','bind','bind','psych','psych',
  'bind','bind','phys','phys','psych','psych',
  'phys','bind','phys','phys','ext',
  'ext','ext','phys','ext','ext','ext','psych'
];
const DIMENSIONS = [
  { key:'phys', label:'物理强度', color:'#e67e22' },
  { key:'bind', label:'束缚感官', color:'#2ecc71' },
  { key:'psych', label:'心理控制', color:'#9b59b6' },
  { key:'ext', label:'极限猎奇', color:'#e056a0' },
];
const TIERS = [
  { pct: 6.25,  label: '极致 S',  side: 's' },
  { pct: 18.75, label: '重度 S',  side: 's' },
  { pct: 31.25, label: '中度 S',  side: 's' },
  { pct: 43.75, label: '轻微 S',  side: 's' },
  { pct: 50,    label: '·',       side: 'c' },
  { pct: 56.25, label: '轻微 M',  side: 'm' },
  { pct: 68.75, label: '中度 M',  side: 'm' },
  { pct: 81.25, label: '重度 M',  side: 'm' },
  { pct: 93.75, label: '极致 M',  side: 'm' },
];
let currentIndex = 0, sCount = 0, skipCount = 0, answered = 0, animated = false;
let answeredIdx = [];
let skippedSet = new Set();
  document.getElementById('dimLeft').style.opacity = '0'; document.getElementById('dimRight').style.opacity = '0';

function buildTierLabels() {
  const c = document.getElementById('tierLabels'); c.innerHTML = '';
  TIERS.forEach(t => {
    const el = document.createElement('span');
    el.className = 'tier-label ' + (t.side === 's' ? 's-side' : t.side === 'm' ? 'm-side' : 'center');
    el.textContent = t.label; el.style.left = t.pct + '%'; c.appendChild(el);
  });
}
function updateTierHighlight(pct) {
  document.querySelectorAll('.tier-label').forEach(el => el.classList.remove('active'));
  let closest = TIERS[0], minDist = Infinity;
  TIERS.forEach(t => { const d = Math.abs(pct - t.pct); if (d < minDist) { minDist = d; closest = t; } });
  const labels = document.querySelectorAll('.tier-label');
  const idx = TIERS.indexOf(closest);
  if (labels[idx]) labels[idx].classList.add('active');
}
function updateQuestion() {
  if (currentIndex >= QUESTIONS.length) { showResult(); return; }
  const q = QUESTIONS[currentIndex];
  document.getElementById('qNumber').textContent = `${currentIndex + 1} / ${QUESTIONS.length}`;
  document.getElementById('qIcon').textContent = q.icon;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('leftLabel').textContent = q.left;
  document.getElementById('rightLabel').textContent = q.right;
  const sIcons = ['👑','🔥','⚔️','🦾','🎪','✋','💀','⚡'];
  const mIcons = ['🔗','💫','🌙','🫂','🧎','🎭','🌀','🩸'];
  document.getElementById('leftIcon').textContent = sIcons[currentIndex % sIcons.length];
  document.getElementById('rightIcon').textContent = mIcons[currentIndex % mIcons.length];
  const card = document.getElementById('questionCard');
  card.style.animation = 'none'; void card.offsetHeight;
  card.style.animation = 'cardIn 0.45s ease-out';
}
function updateProgress() {
  const total = QUESTIONS.length;
  // S = -1, M = +1, 跳过 = 0, 总题数为固定分母
  const mCount = answered - sCount;
  const pct = 50 + ((mCount - sCount) / total) * 50;
  const clamped = Math.max(0, Math.min(100, pct));
  const dimL = document.getElementById('dimLeft');
  const dimR = document.getElementById('dimRight');
  if (clamped < 45) { dimL.style.opacity = '0'; dimR.style.opacity = '0.65'; }
  else if (clamped > 55) { dimL.style.opacity = '0.65'; dimR.style.opacity = '0'; }
  else { dimL.style.opacity = '0.3'; dimR.style.opacity = '0.3'; }
  document.getElementById('progressDot').style.left = clamped + '%';
  if (clamped > 55) document.getElementById('progressDot').textContent = 'M';
  else if (clamped < 45) document.getElementById('progressDot').textContent = 'S';
  else document.getElementById('progressDot').textContent = '·';
  updateTierHighlight(clamped);
}
function choose(side) {
  if (animated || currentIndex >= QUESTIONS.length) return;
  animated = true;
  if (side === 'left') { sCount++; answeredIdx[currentIndex] = 's'; }
  else { answeredIdx[currentIndex] = 'm'; }
  answered++;
  const leftEl = document.getElementById('leftHalf'), rightEl = document.getElementById('rightHalf');
  if (side === 'left') { leftEl.classList.add('chosen-left'); rightEl.classList.remove('chosen-right'); }
  else { rightEl.classList.add('chosen-right'); leftEl.classList.remove('chosen-left'); }
  updateProgress();
  setTimeout(() => {
    leftEl.classList.remove('chosen-left'); rightEl.classList.remove('chosen-right');
    currentIndex++; animated = false; updateQuestion();
  }, 500);
}
function skipQuestion() {
  if (animated || currentIndex >= QUESTIONS.length) return;
  animated = true; skipCount++; skippedSet.add(currentIndex);
  currentIndex++; animated = false; updateQuestion();
}

function renderRadar(dimScores) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 240, H = 240, cx = W/2, cy = H/2, R = 90;
  ctx.clearRect(0, 0, W, H);

  const dims = DIMENSIONS;
  const count = dims.length;
  const angleStep = (Math.PI * 2) / count;
  const startAngle = -Math.PI / 2;

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = (R / 4) * ring;
    ctx.beginPath();
    for (let i = 0; i <= count; i++) {
      const angle = startAngle + i * angleStep;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines + labels
  for (let i = 0; i < count; i++) {
    const angle = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.stroke();

    const lx = cx + (R + 20) * Math.cos(angle);
    const ly = cy + (R + 20) * Math.sin(angle);
    ctx.fillStyle = dims[i].color;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dims[i].label, lx, ly);
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i <= count; i++) {
    const di = i % count;
    const dk = dims[di].key;
    const total = dimScores[dk].s + dimScores[dk].m + dimScores[dk].skip || 1;
    const val = (dimScores[dk].s / total) * R;
    const angle = startAngle + di * angleStep;
    const x = cx + val * Math.cos(angle);
    const y = cy + val * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(231,76,60,0.18)';
  ctx.fill();
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data points
  for (let i = 0; i < count; i++) {
    const dk = dims[i].key;
    const total = dimScores[dk].s + dimScores[dk].m + dimScores[dk].skip || 1;
    const val = (dimScores[dk].s / total) * R;
    const angle = startAngle + i * angleStep;
    const x = cx + val * Math.cos(angle);
    const y = cy + val * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();
  }

  // Center
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fill();
}

function renderDimGrid(dimScores) {
  const grid = document.getElementById('dimGrid');
  if (!grid) return;
  grid.innerHTML = '';
  DIMENSIONS.forEach(d => {
    const total = dimScores[d.key].s + dimScores[d.key].m + dimScores[d.key].skip || 1;
    const pct = Math.round((dimScores[d.key].s / total) * 100);
    const el = document.createElement('div');
    el.className = 'dim-item';
    el.innerHTML = '<div class="dim-label">' + d.label + '</div>' +
      '<div class="dim-bar"><div class="dim-fill" style="width:' + pct + '%;background:' + d.color + '"></div></div>' +
      '<div class="dim-value" style="color:' + d.color + '">' + pct + '% S</div>';
    grid.appendChild(el);
  });
}

  else { icon = '🩸'; title = '极致顺从者'; desc = '你拥有极致的顺从欲望，最深层的臣服是你的归宿。刀割、烙印、穿刺——极端体验对你而言是通往终极信任的桥梁。'; }

  document.getElementById('resultIcon').textContent = icon;

  const dimScores = {};

  for (let i = 0; i < total; i++) {
    const dk = Q_DIMS[i];
    if (answeredIdx[i] === 's') dimScores[dk].s++;
    else if (answeredIdx[i] === 'm') dimScores[dk].m++;

  }

function restart() {
  currentIndex = 0; sCount = 0; skipCount = 0; answered = 0; animated = false; answeredIdx = []; skippedSet = new Set();
  document.getElementById('dimLeft').style.opacity = '0'; document.getElementById('dimRight').style.opacity = '0';
  document.getElementById('progressDot').style.left = '50%'; document.getElementById('progressDot').textContent = '·';
  document.getElementById('resultOverlay').classList.remove('active');
  document.getElementById('leftHalf').classList.remove('chosen-left');
  document.getElementById('rightHalf').classList.remove('chosen-right');
  updateTierHighlight(50); updateQuestion();
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') choose('left');
  else if (e.key === 'ArrowRight') choose('right');
  else if (e.key === 's' || e.key === 'S') skipQuestion();
  else if (e.key === 'r' || e.key === 'R') restart();
});

// ===== AI 分析 =====
function saveApiKey() {
  const key = document.getElementById('aiKey').value.trim();
  if (key) localStorage.setItem('sm_ai_key', key);
}

function loadApiKey() {
  const saved = localStorage.getItem('sm_ai_key');
  if (saved) document.getElementById('aiKey').value = saved;
}

async function runAiAnalysis() {
  const key = document.getElementById('aiKey').value.trim();
  if (!key) { alert('请先输入 OpenRouter API Key'); return; }
  saveApiKey();

  const btn = document.getElementById('aiBtn');
  const loader = document.getElementById('aiLoading');
  const resultEl = document.getElementById('aiResult');
  btn.disabled = true;
  loader.classList.add('active');
  resultEl.classList.remove('active');
  resultEl.innerHTML = '';

  // Build analysis data
  const total = QUESTIONS.length;
  let detail = [];
  for (let i = 0; i < total; i++) {
    const q = QUESTIONS[i];
    const a = answeredIdx[i] === 's' ? 'S' : answeredIdx[i] === 'm' ? 'M' : '跳过';
    detail.push(a + ': ' + q.text + ' (' + q.left + ' / ' + q.right + ')');
  }
  const prompt = '你是一个专业的BDSM取向分析专家。以下是一位用户在SM取向测试中的详细答题记录：' + detail.join('; ') + '。\n\n总统计：S回答 ' + sCount + '次，M回答 ' + (answered - sCount) + '次，跳过 ' + skipCount + '次。\n\n请用中文写一段200字以内的个性化分析，要点：1) 从回答模式推断用户的心理倾向特点 2) 指出最突出的维度偏好（如物理类/心理类/束缚感官类/极限猎奇类）3) 如果跳过了很多题目说明什么 4) 一句建议性总结。语气专业但温暖。不要格式标签，只要纯文本段落。';

  try {
    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + key,
        'Content-Type': 'application/json',
        'HTTP-Referer': window.location.href,
        'X-Title': 'SM Orientation Test'
      },
      body: JSON.stringify({
        model: 'google/gemini-2.0-flash-001',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 500
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API 请求失败 (' + resp.status + ')');
    }

    const data = await resp.json();
    const text = data.choices[0].message.content;
    resultEl.innerHTML = '<p>' + text.replace(/\n/g, '<br/>') + '</p>';
    resultEl.classList.add('active');
  } catch (e) {
    resultEl.innerHTML = '<p style=color:#e74c3c>' + e.message + '</p>';
    resultEl.classList.add('active');
  } finally {
    btn.disabled = false;
    loader.classList.remove('active');
  }
}
